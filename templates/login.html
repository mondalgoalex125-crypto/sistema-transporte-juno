{% extends "base.html" %}

{% block title %}Iniciar Sesión - Sistema de Transporte{% endblock %}

{% block content %}
<!-- Sección Login -->
<div class="container mt-4">
    <div class="row justify-content-center fade-in">
        <div class="col-lg-5 col-md-7 col-sm-9 col-11">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="mobile-logo mb-3">
                            <i class="fas fa-users fa-3x fa-2x text-primary"></i>
                        </div>
                        <h2 class="card-title fw-bold mb-2">BIENVENIDO A JUNO EXPRES</h2>
                        <p class="text-muted small mb-3">Ingresa tus credenciales para acceder al sistema</p>
                        <div class="alert alert-info small py-2">
                            <i class="fas fa-info-circle me-1"></i>
                            <span class="d-sm-none">Detección automática de rol</span>
                        </div>
                    </div>

                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3 mb-md-4">
                            <label for="email" class="form-label small fw-semibold">
                                <i class="fas fa-envelope me-1"></i> Correo Electrónico
                            </label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" 
                                   placeholder="tu@email.com" required>
                        </div>

                        <div class="mb-3 mb-md-4">
                            <label for="password" class="form-label small fw-semibold">
                                <i class="fas fa-lock me-1"></i> Contraseña
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="password" 
                                       name="password" placeholder="Tu contraseña" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
                        </button>

                        <div class="text-center">
                            <p class="mb-0 small">¿No tienes cuenta? 
                                <a href="{{ url_for('registro') }}" class="text-decoration-none fw-semibold">
                                    Regístrate aquí
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.mobile-logo {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

@media (max-width: 768px) {
    .card-body {
        padding: 2rem !important;
    }
    
    .mobile-logo i {
        font-size: 2.5rem !important;
    }
    
    .card-title {
        font-size: 1.5rem;
    }
}

@media (max-width: 576px) {
    .card-body {
        padding: 1.5rem !important;
    }
    
    .mobile-logo i {
        font-size: 2rem !important;
    }
    
    .card-title {
        font-size: 1.3rem;
    }
    
    .form-control-lg {
        font-size: 0.9rem;
        padding: 0.75rem;
    }
}
</style>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const icon = this.querySelector('i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
});
</script>
{% endblock %}
